<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Journal</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Trading Journal</h1>

    <!-- Create Trade Form -->
    <section class="trading-form">
      <h2 id="header">Add Trade</h2>

      <form id="form">
            <label>Trading Pair</label>
            <input type="text" name="pair" placeholder="EURUSD" />

            <label for="position">Position</label>
            <select id= "position" name="position">
                <option value="Buy">Buy</option>
                <option value="Sell">Sell</option>
            </select>

            <label for="profit_loss">Profit / Loss</label>
            <input id="profit_loss" type="number" step="0.01" name="profit_loss" />

            <label for="result">Result</label>
            <select id="result" name="result">
                <option value="Win">Win</option>
                <option value="Loss">Loss</option>
                <option value="Breakeven">Breakeven</option>
            </select>

            <label for="chart_link">Chart Screenshot Link</label>
            <input id= "chart_link" type="url" name="chart_link" />

            <label for="notes">Notes</label>
            <textarea id="notes" name="notes"></textarea>

            <button type="submit">Save Trade</button>
      </form>
    </section>

    <!-- Trade List -->
    <section>
      <h2>Trade History</h2>

      <table border="1">
        <thead>
          <tr>
            <th>Date</th>
            <th>Pair</th>
            <th>Position</th>
            <th>P/L</th>
            <th>Result</th>
            <th>Chart</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>2026-06-15</td>
            <td>EURUSD</td>
            <td>Buy</td>
            <td>+$45.50</td>
            <td>Win</td>
            <td>
              <a href="chart.jpg" target="_blank"> View Chart </a>
            </td>
            <td>
              <button>Edit</button>
              <button>Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </body>
</html>
